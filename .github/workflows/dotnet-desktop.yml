name: build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & test (windows-latest, ${{ matrix.configuration }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore clicky-windows/clicky-windows.sln

      - name: Build
        run: dotnet build clicky-windows/clicky-windows.sln --configuration ${{ matrix.configuration }} --no-restore

      - name: Test
        run: dotnet test clicky-windows/clicky-windows.sln --configuration ${{ matrix.configuration }} --no-build --verbosity normal
